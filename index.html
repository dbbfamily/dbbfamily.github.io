<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>dbbfamily</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #f5f0e8;
      --bg2:     #ede7d9;
      --ink:     #1e1b16;
      --ink2:    #5a5347;
      --accent:  #3a5a40;
      --accent2: #7a9e7e;
      --rule:    #c9bfb0;
      --card-bg: #faf7f2;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      padding: 0;
      overflow-x: hidden;
    }

    /* ── grain overlay ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 100;
      opacity: 0.5;
    }

    /* ── header ── */
    header {
      padding: 4rem 2rem 2rem;
      max-width: 820px;
      margin: 0 auto;
      border-bottom: 1px solid var(--rule);
    }

    .eyebrow {
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1rem;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.1s;
    }

    h1 {
      font-family: 'Instrument Serif', serif;
      font-size: clamp(2.8rem, 8vw, 5rem);
      line-height: 1.0;
      letter-spacing: -0.02em;
      color: var(--ink);
      opacity: 0;
      animation: fadeUp 0.7s ease forwards 0.2s;
    }

    h1 em {
      font-style: italic;
      color: var(--accent);
    }

    .subtitle {
      margin-top: 1.2rem;
      font-size: 0.78rem;
      color: var(--ink2);
      letter-spacing: 0.04em;
      opacity: 0;
      animation: fadeUp 0.7s ease forwards 0.35s;
    }

    /* ── main grid ── */
    main {
      max-width: 820px;
      margin: 0 auto;
      padding: 2.5rem 2rem 5rem;
    }

    .section-label {
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink2);
      margin-bottom: 1.2rem;
      display: flex;
      align-items: center;
      gap: 0.8rem;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.5s;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--rule);
    }

    /* ── cards ── */
    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1px;
      border: 1px solid var(--rule);
      background: var(--rule);
      opacity: 0;
      animation: fadeUp 0.6s ease forwards 0.65s;
    }

    .card {
      background: var(--card-bg);
      padding: 1.6rem 1.4rem 1.4rem;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      transition: background 0.15s ease;
      position: relative;
      overflow: hidden;
    }

    .card::after {
      content: '';
      position: absolute;
      left: 0; top: 0;
      width: 3px; height: 0;
      background: var(--accent);
      transition: height 0.2s ease;
    }

    .card:hover {
      background: var(--bg2);
    }

    .card:hover::after { height: 100%; }

    .card-icon {
      font-size: 1.1rem;
      color: var(--accent2);
      line-height: 1;
    }

    .card-name {
      font-family: 'Instrument Serif', serif;
      font-size: 1.25rem;
      color: var(--ink);
      line-height: 1.2;
    }

    .card-type {
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink2);
      margin-top: auto;
    }

    /* ── loading / error states ── */
    .state {
      padding: 3rem 0;
      text-align: center;
      font-size: 0.75rem;
      color: var(--ink2);
      letter-spacing: 0.06em;
    }

    .state.loading::after {
      content: '';
      display: inline-block;
      width: 0.5em; height: 0.5em;
      border-radius: 50%;
      background: var(--accent);
      margin-left: 0.5em;
      animation: blink 1s ease infinite;
    }

    /* ── footer ── */
    footer {
      max-width: 820px;
      margin: 0 auto;
      padding: 2rem 2rem 3rem;
      border-top: 1px solid var(--rule);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .footer-note {
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      color: var(--ink2);
      text-transform: uppercase;
    }

    #last-updated {
      font-size: 0.6rem;
      letter-spacing: 0.06em;
      color: var(--accent2);
    }

    /* ── animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.2; }
    }

    @media (max-width: 480px) {
      header { padding: 2.5rem 1.2rem 1.5rem; }
      main   { padding: 2rem 1.2rem 4rem; }
      footer { padding: 1.5rem 1.2rem 2.5rem; }
    }
  </style>

</head>

<body>

  <header>
    <p class="eyebrow">dbbfamily.github.io</p>
    <h1>Projects &amp;<br><em>things we build</em></h1>
    <p class="subtitle">A working index — updated automatically from the repository.</p>
  </header>

  <main>
    <p class="section-label">Published sections</p>
    <div id="grid">
      <div class="state loading">Fetching from GitHub</div>
    </div>
  </main>

  <footer>
    <span class="footer-note">github.com/dbbfamily/dbbfamily.github.io</span>
    <span id="last-updated"></span>
  </footer>

  <script>
    const REPO   = 'dbbfamily/dbbfamily.github.io';
    const API    = `https://api.github.com/repos/${REPO}/contents/`;
    const BASE   = 'https://dbbfamily.github.io/';
    const IGNORE = new Set(['.github', '_config.yml', 'CNAME', '.gitignore']);

    /* icons keyed on name fragments */
    const iconFor = name => {
      const n = name.toLowerCase();
      if (n.includes('garden') || n.includes('plant') || n.includes('bottlebrush')) return '🌿';
      if (n.includes('irrigation') || n.includes('water'))  return '💧';
      if (n.includes('garage') || n.includes('room'))       return '🏠';
      if (n.includes('tip'))                                 return '💡';
      if (n.includes('readme'))                              return '📄';
      return '📁';
    };

    async function load() {
      const grid = document.getElementById('grid');

      try {
        const res  = await fetch(API, { headers: { 'Accept': 'application/vnd.github.v3+json' } });
        if (!res.ok) throw new Error(`GitHub API ${res.status}`);
        const items = await res.json();

        /* filter + sort: dirs first, then files; skip ignored */
        const filtered = items
          .filter(i => !IGNORE.has(i.name) && !i.name.startsWith('.'))
          .sort((a, b) => {
            if (a.type !== b.type) return a.type === 'dir' ? -1 : 1;
            return a.name.localeCompare(b.name);
          });

        if (!filtered.length) {
          grid.innerHTML = '<div class="state">No public sections found.</div>';
          return;
        }

        grid.innerHTML = filtered.map(item => {
          const href  = item.type === 'dir' ? `${BASE}${item.name}/` : item.html_url;
          const label = item.type === 'dir' ? 'directory' : item.name.split('.').pop() + ' file';
          return `
            <a class="card" href="${href}" target="${item.type === 'file' ? '_blank' : '_self'}" rel="noopener">
              <span class="card-icon">${iconFor(item.name)}</span>
              <span class="card-name">${item.name}</span>
              <span class="card-type">${label}</span>
            </a>`;
        }).join('');

        /* show last commit date */
        const commitRes = await fetch(
          `https://api.github.com/repos/${REPO}/commits?per_page=1`,
          { headers: { 'Accept': 'application/vnd.github.v3+json' } }
        );
        if (commitRes.ok) {
          const [commit] = await commitRes.json();
          const d = new Date(commit.commit.committer.date);
          document.getElementById('last-updated').textContent =
            `Last commit — ${d.toLocaleDateString('en-AU', { day:'numeric', month:'short', year:'numeric' })}`;
        }

      } catch (err) {
        grid.innerHTML = `<div class="state">Could not load sections (${err.message}).</div>`;
      }
    }

    load();
  </script>

</body>
</html>
